# -- Upstreams -----------------------------------------------------------------
upstream maps_data_service {
    server host.docker.internal:3000;
    keepalive 32;
}

upstream download_service {
    server host.docker.internal:3001;
    keepalive 32;
}

# -- HTTP server ---------------------------------------------------------------
server {
    listen 80;
    server_name _;

    proxy_connect_timeout  10s;
    proxy_send_timeout     30s;
    proxy_read_timeout     30s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # MapsDataService – strips /api/maps prefix, forwards to :3000
    location /api/maps/ {
        proxy_pass http://maps_data_service/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # DownloadService – strips /api/download prefix, forwards to :3001
    # Supports Range requests for video streaming
    location /api/download/ {
        proxy_pass http://download_service/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # Forward Range header so video seeks work
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_force_ranges on;
    }

    # Gateway-level health check
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Default 404
    location / {
        return 404 '{"error":"not found"}';
        add_header Content-Type application/json;
    }
}
