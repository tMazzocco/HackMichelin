# ── Upstreams ──────────────────────────────────────────────────────────────────
# Existing services
upstream maps_data_service { server host.docker.internal:3000; keepalive 32; }
upstream download_service  { server host.docker.internal:3001; keepalive 32; }

# New services
upstream login_service     { server host.docker.internal:3002; keepalive 32; }
upstream user_service      { server host.docker.internal:3003; keepalive 32; }
upstream post_service      { server host.docker.internal:3004; keepalive 32; }
upstream feed_service      { server host.docker.internal:3005; keepalive 32; }
upstream search_service    { server host.docker.internal:3006; keepalive 32; }
upstream upload_service    { server host.docker.internal:3007; keepalive 32; }
upstream comment_service   { server host.docker.internal:3008; keepalive 32; }
upstream like_service      { server host.docker.internal:3009; keepalive 32; }
upstream stats_service     { server host.docker.internal:3010; keepalive 32; }

# ── HTTP server ────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Default body size limit; upload endpoint overrides this below
    client_max_body_size 10m;

    proxy_connect_timeout  10s;
    proxy_send_timeout     60s;
    proxy_read_timeout     60s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── MapsDataService :3000 ──────────────────────────────────────────────────
    location /api/maps/ {
        proxy_pass http://maps_data_service/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── DownloadService :3001 ─────────────────────────────────────────────────
    # Range requests must be forwarded so HLS video seeking works end-to-end.
    location /api/download/ {
        proxy_pass http://download_service/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Range    $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_force_ranges on;
    }

    # ── LoginService :3002 ────────────────────────────────────────────────────
    location /api/auth/ {
        proxy_pass http://login_service/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── UserService :3003 ─────────────────────────────────────────────────────
    location /api/users/ {
        proxy_pass http://user_service/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── PostService :3004 ─────────────────────────────────────────────────────
    location /api/posts/ {
        proxy_pass http://post_service/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── FeedService :3005 ─────────────────────────────────────────────────────
    location /api/feed/ {
        proxy_pass http://feed_service/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── SearchService :3006 ───────────────────────────────────────────────────
    location /api/search/ {
        proxy_pass http://search_service/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── UploadService :3007 ───────────────────────────────────────────────────
    # 200 MB limit for photo/video uploads. Increased timeouts for large files.
    location /api/upload/ {
        client_max_body_size 200m;
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
        proxy_pass http://upload_service/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── CommentService :3008 ──────────────────────────────────────────────────
    location /api/comments/ {
        proxy_pass http://comment_service/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── LikeService :3009 ────────────────────────────────────────────────────
    location /api/likes/ {
        proxy_pass http://like_service/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── StatsService :3010 ───────────────────────────────────────────────────
    location /api/stats/ {
        proxy_pass http://stats_service/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Gateway health check ──────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Default 404 ───────────────────────────────────────────────────────────
    location / {
        return 404 '{"error":"not found"}';
        add_header Content-Type application/json;
    }
}
