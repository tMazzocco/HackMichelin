server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Forward all /api/* requests to the backend gateway.
    # BACK_URL is injected at container start via envsubst (see Dockerfile).
    location /api/ {
        proxy_pass         ${BACK_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # SPA fallback — all unknown paths serve index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets: long cache + immutable
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Compression
    gzip            on;
    gzip_comp_level 5;
    gzip_types      text/plain text/css application/json
                    application/javascript text/javascript
                    image/svg+xml;
}
